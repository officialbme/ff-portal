<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>Flow Factory — Contractor Portal</title>
  <style>
    :root { --navy:#0f2440; --green:#16a34a; --line:#e2e8f0; --muted:#64748b; --bg:#f1f5f9; --accent:#1b3a63; --bad:#dc2626; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background:var(--bg); color:#0f172a; }
    .top { background:var(--navy); color:#fff; padding:16px 18px; }
    .brand { font-weight:800; letter-spacing:.12em; font-size:16px; }
    .co { font-size:20px; font-weight:800; margin-top:4px; }
    .wrap { max-width:760px; margin:0 auto; padding:16px; }
    .job { background:#fff; border:1px solid var(--line); border-radius:12px; padding:14px; margin-bottom:12px; box-shadow:0 1px 3px rgba(15,36,64,.05); }
    .job-head { display:flex; justify-content:space-between; align-items:flex-start; gap:10px; cursor:pointer; }
    .cust { font-weight:700; font-size:16px; }
    .addr { color:var(--muted); font-size:13px; margin-top:2px; }
    .pill { font-size:11px; font-weight:800; padding:4px 9px; border-radius:999px; white-space:nowrap; text-transform:uppercase; letter-spacing:.03em; }
    .p-sched { background:#eef2f7; color:#475569; }
    .p-enroute { background:#fef3c7; color:#92400e; }
    .p-done { background:#dcfce7; color:#166534; }
    .p-cancel { background:#fee2e2; color:#991b1b; }
    .meta { display:flex; flex-wrap:wrap; gap:6px 16px; margin-top:10px; font-size:13px; color:#334155; }
    .meta b { color:#0f172a; }
    .detail { margin-top:12px; border-top:1px solid var(--line); padding-top:12px; display:none; }
    .detail.open { display:block; }
    .lbl { font-size:11px; text-transform:uppercase; letter-spacing:.04em; color:var(--muted); font-weight:700; margin-bottom:6px; }
    .map img, .photos img { width:100%; border-radius:10px; display:block; }
    .photos { display:flex; flex-wrap:wrap; gap:6px; }
    .photos img { width:96px; height:96px; object-fit:cover; }
    .photos a.file { display:inline-flex; align-items:center; justify-content:center; width:96px; height:96px; border:1px solid var(--line); border-radius:10px; font-size:12px; font-weight:700; color:var(--accent); text-decoration:none; text-align:center; padding:4px; }
    .empty { color:var(--muted); text-align:center; padding:40px 12px; }
    .skel { color:var(--muted); font-size:13px; padding:10px 0; }
    .dirbtn { display:inline-block; margin-top:8px; background:var(--accent); color:#fff; text-decoration:none; padding:8px 14px; border-radius:8px; font-size:13px; font-weight:700; border:0; cursor:pointer; }
    input, textarea { width:100%; padding:9px; border:1px solid var(--line); border-radius:8px; margin-bottom:8px; font-size:15px; font-family:inherit; }
  </style>
</head>
<body>
  <div class="top">
    <div class="brand">FLOW FACTORY</div>
    <div class="co" id="coName">Contractor Portal</div>
  </div>
  <div class="wrap">
    <button id="reqBtn" class="dirbtn" style="background:var(--green);margin-bottom:14px;" onclick="showReqForm()">+ Submit a new job</button>
    <div id="reqForm"></div>
    <div id="reqList"></div>
    <div id="docsLbl" class="lbl" style="display:none;">Our documents</div>
    <div id="docs"></div>
    <div class="lbl" id="jobsLbl" style="display:none;">Scheduled jobs</div>
    <div id="jobs"><div class="skel">Loading…</div></div>
  </div>

  <script>
    // ==== config ====
    var APPS = 'https://script.google.com/macros/s/AKfycbxtuuH3QOzdpMlPr2Y_8Jg0qv33sI2Gw01zUPUvHINZ5mVzQNMclRZgr5SKDyQf89Ls/exec';
    function qs(k){ var m=new RegExp('[?&]'+k+'=([^&]*)').exec(location.search); return m?decodeURIComponent(m[1].replace(/\+/g,' ')):''; }
    var CODE = qs('code');
    var JOBS = [], REQS = [];

    // ==== JSONP (no CORS, no Google sandbox) ====
    var _n = 0;
    function jsonp(params, cb){
      var name = 'ffcb_' + (++_n) + '_' + Math.floor(Math.random()*1e6);
      var s = document.createElement('script');
      var timer = setTimeout(function(){ done({ok:false, error:'Timed out.'}); }, 20000);
      function done(data){ if(!window[name]) return; clearTimeout(timer); try{ delete window[name]; }catch(e){ window[name]=undefined; } if(s.parentNode) s.parentNode.removeChild(s); cb(data); }
      window[name] = function(data){ done(data); };
      var q = Object.keys(params).map(function(k){ return encodeURIComponent(k)+'='+encodeURIComponent(params[k]==null?'':params[k]); }).join('&');
      s.src = APPS + '?' + q + '&callback=' + name;
      s.onerror = function(){ done({ok:false, error:'Network error.'}); };
      document.body.appendChild(s);
    }

    function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
    function pill(s){ s=String(s||'').toUpperCase();
      if(s==='DONE') return '<span class="pill p-done">Done</span>';
      if(s==='ENROUTE') return '<span class="pill p-enroute">En route</span>';
      if(s==='CANCELLED') return '<span class="pill p-cancel">Cancelled</span>';
      return '<span class="pill p-sched">Scheduled</span>';
    }
    function scope(j){ var p=[]; if(Number(j.gutter))p.push(j.gutter+"' gutter"); if(Number(j.filter))p.push(j.filter+"' filter"); if(Number(j.drip))p.push(j.drip+"' drip edge"); return p.join(' · ')||(String(j.type).toUpperCase()==='SERVICE'?'Service call':'—'); }

    function load(){
      if(!CODE){ document.getElementById('jobs').innerHTML='<div class="empty">Missing access link.</div>'; return; }
      jsonp({api:'portal', code:CODE}, function(r){
        if(!r || !r.ok){ document.getElementById('jobs').innerHTML='<div class="empty">'+esc((r&&r.error)||'This link is invalid or expired.')+'</div>'; return; }
        render(r.data||{});
        renderRequests(r.requests||[]);
      });
    }

    // ==== requests ====
    function reqPill(s){ s=String(s||'').toUpperCase();
      var map={
        'MEASURE_PROPOSED':['p-enroute','Measure proposed'],
        'MEASURE_ACCEPTED':['p-done','Measure accepted'],
        'MEASURE_DECLINED':['p-cancel','You declined — we\'ll re-propose'],
        'MEASURE_SCHEDULED':['p-done','Measure scheduled'],
        'SCHEDULED':['p-done','Measure scheduled'],
        'ESTIMATE_SENT':['p-enroute','Estimate ready'],
        'ESTIMATE_APPROVED':['p-done','Estimate approved'],
        'ESTIMATE_DECLINED':['p-cancel','Estimate declined'],
        'READY_SET':['p-done','Ready date set'],
        'INSTALL_PROPOSED':['p-enroute','Install proposed'],
        'INSTALL_APPROVED':['p-done','Install confirmed 🎉'],
        'INSTALL_DECLINED':['p-cancel','Install declined']
      };
      var m=map[s]||['p-sched','Submitted'];
      return '<span class="pill '+m[0]+'">'+m[1]+'</span>';
    }
    var COMMITTED=['MEASURE_SCHEDULED','SCHEDULED','ESTIMATE_SENT','ESTIMATE_APPROVED','ESTIMATE_DECLINED','READY_SET','INSTALL_PROPOSED','INSTALL_APPROVED','INSTALL_DECLINED','DONE'];
    var EDITING = '';
    function showReqForm(existing){
      EDITING = existing ? existing.id : '';
      var e = existing || {};
      document.getElementById('reqForm').innerHTML =
        '<div class="job"><div class="cust" style="margin-bottom:8px;">'+(EDITING?'Edit job':'New job')+'</div>'+
        '<input id="rqCust" placeholder="Customer name *" value="'+esc(e.customer||'')+'">'+
        '<input id="rqAddr" placeholder="Address" value="'+esc(e.address||'')+'">'+
        '<input id="rqPhone" placeholder="Phone" inputmode="numeric" value="'+esc(e.phone||'')+'">'+
        '<textarea id="rqNotes" rows="3" placeholder="Job description / notes">'+esc(e.notes||'')+'</textarea>'+
        '<div style="margin-top:4px;"><button class="dirbtn" style="background:var(--green);" onclick="submitRequest()">'+(EDITING?'Save changes':'Submit job')+'</button> <button class="dirbtn" style="background:var(--muted);" onclick="closeReqForm()">Cancel</button> <span id="rqMsg" style="font-size:13px;margin-left:6px;"></span></div>'+
        (EDITING?'<div class="addr" style="margin-top:8px;">Editing resets any measure day we proposed — we\'ll reschedule.</div>':'<div class="addr" style="margin-top:8px;">Need to attach documents/photos? Submit the job first, then reply to our text/email with them.</div>')+
        '</div>';
      window.scrollTo(0,0);
    }
    function closeReqForm(){ EDITING=''; document.getElementById('reqForm').innerHTML=''; }
    function submitRequest(){
      var cust=(document.getElementById('rqCust').value||'').trim();
      var msg=document.getElementById('rqMsg');
      if(!cust){ msg.textContent='Customer name required.'; return; }
      msg.textContent = EDITING ? 'Saving…' : 'Submitting…';
      var params={ code:CODE, customer:cust, address:document.getElementById('rqAddr').value, phone:document.getElementById('rqPhone').value, notes:document.getElementById('rqNotes').value };
      params.api = EDITING ? 'editRequest' : 'submit';
      if(EDITING) params.requestId = EDITING;
      jsonp(params, function(r){
        if(r&&r.ok){ EDITING=''; document.getElementById('reqForm').innerHTML='<div class="job" style="color:var(--green);font-weight:700;">✓ '+(params.api==='editRequest'?'Changes saved — the team was notified.':'Job submitted — we\'ll schedule a measure and let you know.')+'</div>'; load(); }
        else { msg.textContent=(r&&r.error)||'Failed.'; }
      });
    }
    function editRequest(id){ var r=REQS.filter(function(x){return x.id===id;})[0]; if(r) showReqForm(r); }
    function deleteRequest(id){
      var r=REQS.filter(function(x){return x.id===id;})[0]; if(!r) return;
      if(!confirm('Delete this job request for '+(r.customer||'this customer')+'? The Flow Factory team will be notified.')) return;
      jsonp({api:'deleteRequest', code:CODE, requestId:id}, function(res){ if(res&&res.ok){ load(); } else { alert((res&&res.error)||'Could not delete.'); } });
    }
    function statusLine(r){
      var s=String(r.status||'').toUpperCase();
      var m={
        'SUBMITTED':'Submitted — we\'ll propose a day to measure.',
        'MEASURE_PROPOSED':'We proposed a day to measure — accept below.',
        'MEASURE_ACCEPTED':'Measure accepted — we\'ll confirm the schedule.',
        'MEASURE_SCHEDULED':'Measure scheduled'+(r.measureDate?(' for '+esc(r.measureDate)):'')+'.',
        'SCHEDULED':'Measure scheduled'+(r.measureDate?(' for '+esc(r.measureDate)):'')+'.',
        'ESTIMATE_SENT':'Your estimate is ready — review and approve below.',
        'ESTIMATE_APPROVED':'Estimate approved — set your "ready after" date below.',
        'ESTIMATE_DECLINED':'You declined the estimate — we\'ll follow up.',
        'READY_SET':'Ready after '+esc(r.readyAfter||'')+' — we\'ll schedule the install.',
        'INSTALL_PROPOSED':'Install date proposed — approve below.',
        'INSTALL_APPROVED':'Install confirmed'+(r.installDate?(' for '+esc(r.installDate)):'')+'. 🎉',
        'INSTALL_DECLINED':'You declined the install date — we\'ll re-propose.'
      };
      return m[s]||esc(s.replace(/_/g,' '));
    }
    function diagramBlock(r){
      var d=r.diagram||[]; if(!d.length) return '';
      return '<div style="margin-top:10px;"><div class="lbl">Gutter diagram</div>'+d.map(function(x){
        return '<a href="'+esc(x.url)+'" target="_blank" rel="noopener" style="display:block;text-decoration:none;color:var(--accent);font-weight:700;">'+
          (x.thumb?'<img src="'+esc(x.thumb)+'" alt="diagram" style="width:100%;border-radius:10px;border:1px solid var(--line);display:block;">':'📐 View diagram')+'</a>';
      }).join('')+'</div>';
    }
    function estimateBlock(r){
      if(!(Number(r.estimateTotal)>0)) return '';
      var lf=Number(r.lf)||0, waste=Number(r.wasteFt)||10, rate=Number(r.rate)||0, billed=lf+waste;
      return '<div style="margin-top:10px;padding:10px 12px;background:#f8fafc;border:1px dashed var(--line);border-radius:10px;">'+
        '<div class="lbl">Estimate</div>'+
        '<div style="font-size:13px;">'+lf+' LF measured <span style="color:var(--muted);">+ '+waste+' ft waste</span> = '+billed+' ft × $'+rate+'/ft</div>'+
        '<div style="font-size:22px;font-weight:800;color:var(--green);margin-top:4px;">$'+Number(r.estimateTotal).toFixed(2)+'</div>'+
        '<div class="addr" style="margin-top:2px;">Includes '+waste+' ft added for waste.</div></div>';
    }
    function docsBlock(r){
      var d=r.docs||[]; if(!d.length) return '';
      return '<div class="addr" style="margin-top:8px;">Files: '+d.map(function(x){ return '<a href="'+esc(x.url)+'" target="_blank" rel="noopener">'+esc(x.name||'file')+'</a>'; }).join(' · ')+'</div>';
    }
    function fmtNoteDate(iso){ try{ var d=new Date(iso); return (d.getMonth()+1)+'/'+d.getDate(); }catch(e){ return ''; } }
    function notesBlock(r){
      var mine=(r.contractorNotes||[]).map(function(x){ return {by:'you',text:x.text,at:x.at}; });
      var theirs=(r.officeNotes||[]).map(function(x){ return {by:'office',text:x.text,at:x.at}; });
      var all=mine.concat(theirs).sort(function(a,b){ return String(a.at)<String(b.at)?-1:1; });
      var list = all.length ? all.map(function(x){
        var who=x.by==='office'?'Flow Factory':'You', col=x.by==='office'?'var(--navy)':'var(--accent)';
        return '<div style="font-size:13px;padding:6px 0;border-bottom:1px solid var(--line);"><span style="color:'+col+';font-weight:700;">'+who+'</span> <span style="color:var(--muted);">· '+esc(fmtNoteDate(x.at))+'</span><div>'+esc(x.text)+'</div></div>';
      }).join('') : '<div class="addr">No notes yet.</div>';
      return '<div style="margin-top:10px;"><div class="lbl">Notes with the office</div>'+list+
        '<textarea id="nt_'+r.id+'" rows="2" placeholder="Add a note the office will see…" style="width:100%;margin-top:6px;padding:8px;border:1px solid var(--line);border-radius:8px;font-family:inherit;font-size:14px;"></textarea>'+
        '<button class="dirbtn" style="background:var(--accent);padding:6px 12px;margin-top:2px;" onclick="addNote(\''+r.id+'\')">Add note</button></div>';
    }
    function addNote(id){
      var el=document.getElementById('nt_'+id), t=(el&&el.value||'').trim();
      if(!t){ return; }
      el.disabled=true;
      jsonp({api:'addNote', code:CODE, requestId:id, text:t}, function(r){ if(r&&r.ok){ load(); } else { el.disabled=false; alert((r&&r.error)||'Could not add note.'); } });
    }
    function renderRequests(list){
      REQS=list||[]; var el=document.getElementById('reqList');
      if(!REQS.length){ el.innerHTML=''; return; }
      el.innerHTML='<div class="lbl">Your jobs</div>'+REQS.map(function(r){
        var s=String(r.status||'').toUpperCase();
        var actions='';
        if(s==='MEASURE_PROPOSED') actions='<div style="margin-top:8px;"><button class="dirbtn" style="background:var(--green);" onclick="respond(\''+r.id+'\',true)">Accept '+esc(r.measureDate)+'</button> <button class="dirbtn" style="background:var(--bad);" onclick="respond(\''+r.id+'\',false)">Decline</button></div>';
        else if(s==='ESTIMATE_SENT') actions='<div style="margin-top:8px;"><button class="dirbtn" style="background:var(--green);" onclick="respondEstimate(\''+r.id+'\',true)">Approve estimate</button> <button class="dirbtn" style="background:var(--bad);" onclick="respondEstimate(\''+r.id+'\',false)">Decline</button></div>';
        else if(s==='ESTIMATE_APPROVED') actions='<div style="margin-top:8px;"><span class="addr">When can we install after?</span><br><input type="date" id="ra_'+r.id+'" style="margin:6px 0;"><br><button class="dirbtn" style="background:var(--green);" onclick="setReady(\''+r.id+'\')">Set ready-after date</button></div>';
        else if(s==='INSTALL_PROPOSED') actions='<div style="margin-top:8px;"><button class="dirbtn" style="background:var(--green);" onclick="respondInstall(\''+r.id+'\',true)">Approve '+esc(r.installDate)+'</button> <button class="dirbtn" style="background:var(--bad);" onclick="respondInstall(\''+r.id+'\',false)">Decline</button></div>';
        var committed = COMMITTED.indexOf(s)!==-1;
        var manage='<div style="margin-top:10px;padding-top:8px;border-top:1px solid var(--line);">'+
          '<button class="dirbtn" style="background:var(--accent);padding:6px 12px;" onclick="editRequest(\''+r.id+'\')">Edit</button> '+
          (committed?'':'<button class="dirbtn" style="background:var(--bad);padding:6px 12px;" onclick="deleteRequest(\''+r.id+'\')">Delete</button> ')+
          '<label class="dirbtn" style="background:var(--muted);padding:6px 12px;cursor:pointer;">📎 Attach file<input type="file" style="display:none;" onchange="attachReqFile(this,\''+r.id+'\')"></label></div>';
        return '<div class="job"><div class="job-head"><div><div class="cust">'+esc(r.customer||'')+'</div><div class="addr">'+esc(r.address||'')+'</div></div>'+reqPill(r.status)+'</div>'+
          '<div class="addr" style="margin-top:6px;color:var(--ink);">'+statusLine(r)+'</div>'+
          (r.notes?('<div class="addr" style="margin-top:6px;">'+esc(r.notes)+'</div>'):'')+
          diagramBlock(r)+ estimateBlock(r)+ docsBlock(r)+ notesBlock(r)+ actions + manage +'</div>';
      }).join('');
    }
    function respond(id, accept){ jsonp({api:'respond', code:CODE, requestId:id, accept:accept}, function(r){ if(r&&r.ok) load(); else alert((r&&r.error)||'Failed.'); }); }
    function respondEstimate(id, ok){ if(!ok && !confirm('Decline this estimate?')) return; jsonp({api:'respondEstimate', code:CODE, requestId:id, approve:ok}, function(r){ if(r&&r.ok) load(); else alert((r&&r.error)||'Failed.'); }); }
    function setReady(id){ var v=document.getElementById('ra_'+id).value; if(!v){ alert('Pick a date.'); return; } var dp=v.split('-'), d=dp.length===3?(Number(dp[1])+'/'+Number(dp[2])+'/'+dp[0]):v; jsonp({api:'setReadyAfter', code:CODE, requestId:id, date:d}, function(r){ if(r&&r.ok) load(); else alert((r&&r.error)||'Failed.'); }); }
    function respondInstall(id, ok){ if(!ok && !confirm('Decline this install date?')) return; jsonp({api:'respondInstall', code:CODE, requestId:id, approve:ok}, function(r){ if(r&&r.ok) load(); else alert((r&&r.error)||'Failed.'); }); }
    function attachReqFile(input,id){
      var f=input.files&&input.files[0]; if(!f) return;
      if(f.size>40*1024*1024){ alert('File too big (max 40MB).'); return; }
      var rd=new FileReader();
      rd.onload=function(){
        fetch(APPS,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({action:'contractorReqDoc',code:CODE,requestId:id,dataUrl:rd.result,filename:f.name})})
          .then(function(){ setTimeout(load,1500); }).catch(function(){ alert('Upload failed.'); });
      };
      rd.readAsDataURL(f);
      input.value='';
    }

    // ==== docs + jobs ====
    function renderDocs(docs){
      var lbl=document.getElementById('docsLbl'), box=document.getElementById('docs');
      if(!docs||!docs.length){ lbl.style.display='none'; box.innerHTML=''; return; }
      lbl.style.display='block';
      box.innerHTML = docs.map(function(d){ return '<a class="job" style="display:block;text-decoration:none;color:inherit;" href="'+esc(d.url)+'" target="_blank" rel="noopener">📄 '+esc(d.name)+'</a>'; }).join('');
    }
    function render(data){
      document.getElementById('coName').textContent = data.company || 'Contractor Portal';
      renderDocs(data.deployedDocs||[]);
      JOBS = data.jobs||[];
      var w=document.getElementById('jobs');
      document.getElementById('jobsLbl').style.display = JOBS.length ? 'block' : 'none';
      if(!JOBS.length){ w.innerHTML='<div class="empty">No scheduled jobs yet.</div>'; return; }
      w.innerHTML = JOBS.map(function(j,i){
        return '<div class="job">'+
          '<div class="job-head" onclick="toggle('+i+')">'+
            '<div><div class="cust">'+esc(j.customer||'Job')+'</div><div class="addr">'+esc(j.address||'')+'</div></div>'+
            pill(j.status)+
          '</div>'+
          '<div class="meta">'+
            '<div><b>'+esc(j.date||'')+'</b>'+(j.timeSlot?(' · '+esc(j.timeSlot)):'')+'</div>'+
            '<div>'+esc(scope(j))+'</div>'+
            (j.finished?('<div>Completed '+esc(j.finished)+'</div>'):(j.etaTime?('<div>ETA '+esc(j.etaTime)+'</div>'):''))+
          '</div>'+
          '<div class="detail" id="d'+i+'"></div>'+
        '</div>';
      }).join('');
    }
    function toggle(i){
      var el=document.getElementById('d'+i); if(!el) return;
      if(el.classList.contains('open')){ el.classList.remove('open'); return; }
      el.classList.add('open');
      var j=JOBS[i];
      el.innerHTML='<div class="lbl">Location</div><div class="map" id="m'+i+'"><div class="skel">Loading map…</div></div>'+
        (j.address?'<a class="dirbtn" href="https://www.google.com/maps/dir/?api=1&destination='+encodeURIComponent(j.address)+'" target="_blank" rel="noopener">Directions</a>':'')+
        '<div class="lbl" style="margin-top:14px;">Gutter map &amp; photos</div><div class="photos" id="p'+i+'"><div class="skel">Loading…</div></div>';
      jsonp({api:'map', code:CODE, address:j.address||''}, function(r){ var m=document.getElementById('m'+i); if(!m) return; var uri=r&&r.ok?r.map:''; m.innerHTML=uri?'<img src="'+uri+'" alt="map">':'<div class="skel">Map unavailable.</div>'; });
      jsonp({api:'photos', code:CODE, week:j.week, row:j.row}, function(r){ renderPhotos(i, (r&&r.ok)?r.photos:[]); });
    }
    function renderPhotos(i, photos){
      var el=document.getElementById('p'+i); if(!el) return;
      if(!photos||!photos.length){ el.innerHTML='<div class="skel">No photos uploaded yet.</div>'; return; }
      el.innerHTML=photos.map(function(p){
        if(p.dataUrl) return '<a href="'+esc(p.url)+'" target="_blank" rel="noopener"><img src="'+p.dataUrl+'" alt="photo"></a>';
        if(p.url) return '<a class="file" href="'+esc(p.url)+'" target="_blank" rel="noopener">▶ View file</a>';
        return '';
      }).join('');
    }
    load();
  </script>
</body>
</html>
